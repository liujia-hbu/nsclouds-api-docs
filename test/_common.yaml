openapi: 3.1.0
info:
  title: 测试 API (公共)
  description: 仅用于测试跨文件引用
  version: 1.0.0
servers:
  - url: https://aillm.sinocache.net
    description: 测试服务器
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
  responses:
    ErrorResponse:
      description: 错误响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      name: Authorization
      in: header
