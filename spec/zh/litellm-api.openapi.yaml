components:
  schemas:
    CreateChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        choices:
          type: array
          items:
            type: object
    CreateEmbeddingRequest:
      type: object
      properties:
        model:
          type: string
        input:
          type: string
    EmbeddingResponse:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
    CreateImageGenerationRequest:
      type: object
      properties:
        model:
          type: string
        prompt:
          type: string
    ImageResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
    CreateImageEditRequest:
      type: object
      properties:
        model:
          type: string
        image:
          type: string
          format: binary
        prompt:
          type: string
    CreateTranscriptionRequest:
      type: object
      properties:
        model:
          type: string
        file:
          type: string
          format: binary
    TranscriptionResponse:
      type: object
      properties:
        text:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      name: Authorization
      in: header
  responses:
    ErrorResponse:
      description: 错误响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default-error:
              summary: 基础错误
              description: 通用错误响应示例。
              value:
                error:
                  message: Invalid request
                  type: invalid_request_error
                  code: 400
