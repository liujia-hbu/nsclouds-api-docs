paths:
  # ========== 对话生成 API - 深度求索 - OpenAI 协议 ==========
  /v1/chat/completions/deepseek/openai:
    post:
      tags:
        - chat_completions_deepseek
        - chat_completions_deepseek_openai
      summary: 深度求索 - OpenAI 协议 - 创建聊天补全
      description: 基于输入的消息，生成模型回复。使用深度求索（DeepSeek）模型，兼容 OpenAI 协议。
      operationId: createChatCompletionDeepSeekOpenAI
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的对话示例，包含系统提示和用户消息。
                value:
                  model: deepseek-chat
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-123
                    object: chat.completion
                    created: 1677652288
                    model: deepseek-chat
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: Hello there! How can I assist you today?
                        finish_reason: stop
                    usage:
                      prompt_tokens: 9
                      completion_tokens: 12
                      total_tokens: 21
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 对话生成 API - 智谱 - OpenAI 协议 ==========
  /v1/chat/completions/zai/openai:
