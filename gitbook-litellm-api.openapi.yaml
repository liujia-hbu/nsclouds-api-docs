      summary: 创建文本补全
      description: |-
        基于提供的提示，生成一个或多个补全结果。与 OpenAI 的 Completions API 兼容。

        > 💡 **提示**：选择下方的请求示例后，请手动在响应示例区域选择同名的示例以查看对应的输出。
      operationId: createCompletion
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的文本补全示例。
                value:
                  model: gpt-3.5-turbo-instruct
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  'n': 1
                  stream: false
                x-gitbook-description-html: <p>一个简单的文本补全示例。</p>
              streaming:
